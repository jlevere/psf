name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The `expand` feature pulls the public `msdelta` via an ssh:// git pin
      # (kept ssh:// so the rev unifies with msu's pin). Fetch it anonymously.
      - run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --all-features

  # Guard the pure sans-IO core: every other job uses --all-features, which
  # would mask a regression that only breaks the default build.
  no-default-features:
    name: test (no default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --no-default-features

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  msrv:
    name: msrv (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
      - uses: dtolnay/rust-toolchain@1.85
      - run: cargo check --all-targets --all-features
